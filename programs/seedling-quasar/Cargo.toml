[package]
name = "seedling-quasar"
version = "0.1.0"
edition = "2021"

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
    'cfg(target_os, values("solana"))',
]

[lib]
crate-type = ["cdylib"]

[features]
alloc = []
client = []
debug = []

[dependencies]
quasar-lang = { git = "https://github.com/blueshift-gg/quasar" }
quasar-spl = { git = "https://github.com/blueshift-gg/quasar" }
quasar-derive = { git = "https://github.com/blueshift-gg/quasar" }
zeropod = { version = "0.2.0", features = ["solana-address", "solana-program-error"] }
solana-program-error = "3.0.0"

[dev-dependencies]
# QuasarSerialize derive emits raw `wincode::*` paths, so consumer crates
# need wincode as a regular dep when running host-side cargo test.
wincode = { version = "0.4", features = ["derive"] }
# seedling-quasar-client is auto-generated by `quasar idl` and currently has
# a codegen bug (missing InitializeVaultArgs import in generated lib.rs).
# Re-enable when we need QuasarSVM integration tests + the bug is fixed
# upstream. For now we run pure-math unit tests that don't need the client.
# seedling-quasar-client = { path = "target/client/rust/seedling-quasar-client" }
# quasar-svm = { git = "https://github.com/blueshift-gg/quasar-svm" }
