# Pinned 2026-04-24. Compatible with Kamino declare_program! IDL approach.
# Downgrade to 0.31.1 only if Kamino CPI breaks.
[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

# Single program ID across localnet + devnet (Day 7 deployment).
# Keypair at target/deploy/seedling-keypair.json; backup at
# ~/refs/seedling-devnet-program-keypair.json (DO NOT LOSE — redeploying
# under a new ID orphans any on-chain state).
[programs.localnet]
seedling = "44vix4JmG4hdoharDH38R5sc7g5MbFxjvpUpgwNDbTYN"

[programs.devnet]
seedling = "44vix4JmG4hdoharDH38R5sc7g5MbFxjvpUpgwNDbTYN"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
